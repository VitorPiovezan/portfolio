# Publica o portfólio na raiz do domínio e embute o app my-finance em /my-finance/
# (build do repo VitorPiovezan/my-finance copiado para dist/my-finance/).
#
# Secrets: copie no repositório portfolio os mesmos VITE_FIREBASE_* que usa em my-finance
# (Settings → Secrets and variables → Actions), para o build do app manter login/Firebase.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Checkout my-finance
        uses: actions/checkout@v4
        with:
          repository: VitorPiovezan/my-finance
          ref: main
          path: .tmp-my-finance

      - name: Setup Node (npm) for my-finance
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .tmp-my-finance/package-lock.json

      - name: Build my-finance
        working-directory: .tmp-my-finance
        env:
          VITE_BASE_PATH: /my-finance/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm ci && npm run build

      - name: Embed my-finance into site
        run: |
          mkdir -p dist/my-finance
          cp -a .tmp-my-finance/dist/. dist/my-finance/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
